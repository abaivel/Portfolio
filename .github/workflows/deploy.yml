name: Build & Deploy Blazor WASM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor
        run: dotnet publish -c Release -o publish
        working-directory: Portfolio/Portfolio

      # Remplacement du base href
      - name: Update base href
        run: |
          sed -i 's|<base href=".*" />|<base href="/portfolio/" />|g' publish/wwwroot/index.html
        working-directory: Portfolio/Portfolio
        
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: Portfolio/Portfolio/publish/wwwroot/
          server-dir: www/portfolio/
